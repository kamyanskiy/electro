version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: electro_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-electro_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - electro_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    env_file:
      - .env

  backend:
    env_file:
      - .env
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: electro_backend
    environment:
      # База данных
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-electro_db}
      DB_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-electro_db}

      # Приложение
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}

      # Суперпользователь (опционально)
      SUPERUSER_USERNAME: ${SUPERUSER_USERNAME:-}
      SUPERUSER_PASSWORD: ${SUPERUSER_PASSWORD:-}
      SUPERUSER_EMAIL: ${SUPERUSER_EMAIL:-}
      SUPERUSER_PLOT_NUMBER: ${SUPERUSER_PLOT_NUMBER:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - electro_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    env_file:
      - .env
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: electro_frontend
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - electro_network
    restart: unless-stopped

networks:
  electro_network:
    driver: bridge

volumes:
  postgres_data: